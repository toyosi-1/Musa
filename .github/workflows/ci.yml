name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when a new commit lands on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck / Lint / Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        # `npm ci` is strict about the lockfile and faster than `npm install`
        # in CI. `--no-audit --prefer-offline` skip work the cache covers.
        run: npm ci --no-audit --prefer-offline

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        # Rules tests are excluded from the default config — they need a
        # Java-backed Firebase emulator and run via `npm run test:rules`.
        run: npm test -- --reporter=dot
